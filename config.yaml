# =============================================================================
# config.yaml — Single source of truth for the synthetic data pipeline
# No hardcoded paths, epsilons, seeds, or hyperparameters anywhere in src/
# =============================================================================

# -----------------------------------------------------------------------------
# Global settings
# -----------------------------------------------------------------------------
global:
  seed: 42
  test_size: 0.2          # fraction of data held out as test set (sacred — never seen by generators)
  log_level: INFO

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
paths:
  raw_data:     data/raw
  processed:    data/processed
  synthetic:    data/synthetic
  outputs:      outputs/results
  plots:        outputs/plots

# -----------------------------------------------------------------------------
# Datasets
# -----------------------------------------------------------------------------
datasets:

  diabetes_130us:
    raw_file:       data/raw/diabetes_130us.csv
    processed_dir:  data/processed/diabetes_130us
    synthetic_dir:  data/synthetic/diabetes_130us
    target_col:     readmitted
    drop_cols:
      - encounter_id
      - patient_nbr
      # >80% null — too sparse to impute
      - weight
      - max_glu_serum
      - A1Cresult
      # >40% null + high cardinality categorical — drop rather than impute
      - payer_code
      - medical_specialty
      # Constant columns — zero variance, no information
      - examide
      - citoglipton
    missing_values:
      - "?"           # dataset-specific missing value marker
    high_null_impute:
      # Columns with moderate nulls — impute rather than drop
      race: mode
      diag_1: mode
      diag_2: mode
      diag_3: mode
    icd_cols:
      # ICD-9 code columns — group by first 3 characters before encoding
      - diag_1
      - diag_2
      - diag_3
    ordinal_cols:
      # Drug dosage columns — ordinal categories, not numeric
      - metformin
      - repaglinide
      - nateglinide
      - chlorpropamide
      - glimepiride
      - acetohexamide
      - glipizide
      - glyburide
      - tolbutamide
      - pioglitazone
      - rosiglitazone
      - acarbose
      - miglitol
      - troglitazone
      - tolazamide
      - insulin
      - glyburide-metformin
      - glipizide-metformin
      - glimepiride-pioglitazone
      - metformin-rosiglitazone
      - metformin-pioglitazone

  home_credit:
    raw_file:       data/raw/home_credit_default_risk.csv
    processed_dir:  data/processed/home_credit
    synthetic_dir:  data/synthetic/home_credit
    target_col:     TARGET
    drop_cols:
      # Identifier
      - SK_ID_CURR
      # >65% null
      - OWN_CAR_AGE
      # Structural property block — ~48% of rows null together
      - APARTMENTS_AVG
      - BASEMENTAREA_AVG
      - YEARS_BEGINEXPLUATATION_AVG
      - YEARS_BUILD_AVG
      - COMMONAREA_AVG
      - ELEVATORS_AVG
      - ENTRANCES_AVG
      - FLOORSMAX_AVG
      - FLOORSMIN_AVG
      - LANDAREA_AVG
      - LIVINGAPARTMENTS_AVG
      - LIVINGAREA_AVG
      - NONLIVINGAPARTMENTS_AVG
      - NONLIVINGAREA_AVG
      - APARTMENTS_MODE
      - BASEMENTAREA_MODE
      - YEARS_BEGINEXPLUATATION_MODE
      - YEARS_BUILD_MODE
      - COMMONAREA_MODE
      - ELEVATORS_MODE
      - ENTRANCES_MODE
      - FLOORSMAX_MODE
      - FLOORSMIN_MODE
      - LANDAREA_MODE
      - LIVINGAPARTMENTS_MODE
      - LIVINGAREA_MODE
      - NONLIVINGAPARTMENTS_MODE
      - NONLIVINGAREA_MODE
      - FONDKAPREMONT_MODE
      - HOUSETYPE_MODE
      - TOTALAREA_MODE
      - WALLSMATERIAL_MODE
      - EMERGENCYSTATE_MODE
      - APARTMENTS_MEDI
      - BASEMENTAREA_MEDI
      - YEARS_BEGINEXPLUATATION_MEDI
      - YEARS_BUILD_MEDI
      - COMMONAREA_MEDI
      - ELEVATORS_MEDI
      - ENTRANCES_MEDI
      - FLOORSMAX_MEDI
      - FLOORSMIN_MEDI
      - LANDAREA_MEDI
      - LIVINGAPARTMENTS_MEDI
      - LIVINGAREA_MEDI
      - NONLIVINGAPARTMENTS_MEDI
      - NONLIVINGAREA_MEDI
    days_employed_sentinel: 365243   # sentinel value meaning "unemployed"
    log_transform_cols:
      # Heavy right skew — log1p transform before generation
      - AMT_INCOME_TOTAL
      - AMT_CREDIT
      - AMT_ANNUITY
      - AMT_GOODS_PRICE
    median_impute_cols:
      # Moderate nulls — impute with median
      - EXT_SOURCE_1
      - EXT_SOURCE_2
      - EXT_SOURCE_3
      - AMT_REQ_CREDIT_BUREAU_HOUR
      - AMT_REQ_CREDIT_BUREAU_DAY
      - AMT_REQ_CREDIT_BUREAU_WEEK
      - AMT_REQ_CREDIT_BUREAU_MON
      - AMT_REQ_CREDIT_BUREAU_QRT
      - AMT_REQ_CREDIT_BUREAU_YEAR
      - OBS_30_CNT_SOCIAL_CIRCLE
      - DEF_30_CNT_SOCIAL_CIRCLE
      - OBS_60_CNT_SOCIAL_CIRCLE
      - DEF_60_CNT_SOCIAL_CIRCLE
      - CNT_FAM_MEMBERS
      - DAYS_LAST_PHONE_CHANGE
      - AMT_GOODS_PRICE
      - AMT_ANNUITY
    mode_impute_cols:
      # Categorical nulls — impute with unknown category
      - NAME_TYPE_SUITE
      - OCCUPATION_TYPE
    missing_values: []

  acs_income:
    raw_file:       data/raw/acs_income_ca_2018.csv
    processed_dir:  data/processed/acs_income
    synthetic_dir:  data/synthetic/acs_income
    target_col:     PINCP
    drop_cols: []
    missing_values: []
    categorical_cols:
      # Integer-coded census columns — treat as categorical despite numeric dtype
      - COW
      - SCHL
      - MAR
      - RELP
      - SEX
      - RAC1P
      - POBP
    occp_col: OCCP            # occupation code — group to SOC major groups (first 2 digits)
    continuous_cols:
      - AGEP
      - WKHP

# -----------------------------------------------------------------------------
# Generators
# -----------------------------------------------------------------------------
generators:
  list:
    - ctgan
    - tvae
    - copulagan

  # Shared hyperparameters (can be overridden per generator below)
  default:
    epochs:      300
    batch_size:  500

  ctgan:
    epochs:         300
    batch_size:     500
    generator_dim:  [256, 256]
    discriminator_dim: [256, 256]

  tvae:
    epochs:         300
    batch_size:     500
    compress_dims:  [128, 128]
    decompress_dims: [128, 128]

  copulagan:
    epochs:         300
    batch_size:     500

# -----------------------------------------------------------------------------
# Differential privacy
# -----------------------------------------------------------------------------
differential_privacy:
  enabled: true
  epsilons:
    - 1
    - 5
    - 10
  delta: 1e-5             # standard choice: 1/N where N ~ dataset size; 1e-5 is a safe default
  max_grad_norm: 1.0      # DP-SGD clipping threshold

# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
evaluation:

  utility:
    tstr:
      model:          xgboost
      n_estimators:   100
      max_depth:      6
      learning_rate:  0.1
      metrics:
        - roc_auc
        - f1_weighted
        - accuracy

  privacy:
    mia:
      model:          xgboost   # shadow model for the attacker
      n_estimators:   100
      attack_samples: 2000      # number of train + test records fed to attacker
    dcr:
      sample_size:    5000      # rows to sample for distance computation (full set is slow)
    nndr:
      sample_size:    5000

# -----------------------------------------------------------------------------
# Reporting
# -----------------------------------------------------------------------------
reporting:
  output_file:    outputs/results/full_benchmark.csv
  utility_file:   outputs/results/utility_scores.csv
  privacy_file:   outputs/results/privacy_scores.csv
  plots:
    tradeoff_curves:      outputs/plots/tradeoff_curves
    correlation_heatmaps: outputs/plots/correlation_heatmaps
    tstr_comparisons:     outputs/plots/tstr_comparisons
  pareto:
    utility_metric: roc_auc   # metric used to define Pareto frontier
    privacy_metric: mia_auc   # lower is better (closer to 0.5 = random = private)